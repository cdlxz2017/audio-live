# ============================================================
# 渗透测试目标配置文件
# ============================================================
# 使用说明：
#   1. 填写所有必填项后保存
#   2. 授权文件路径必须指向有效的授权书扫描件/PDF
#   3. 所有测试必须在授权范围内进行
# ============================================================

# --- 项目信息 ---
PROJECT_NAME="Example-PenTest-2026"
TESTER_NAME="Security Team"
CLIENT_NAME="Example Corp"

# --- 授权文件路径（必填，执行前会验证） ---
AUTH_FILE="/path/to/authorization.pdf"

# --- 目标网段（CIDR格式，多个用空格分隔） ---
TARGET_SUBNETS="192.168.1.0/24"

# --- 目标域名（多个用空格分隔） ---
TARGET_DOMAINS="example.com www.example.com"

# --- 排除IP（不扫描的地址，多个用空格分隔） ---
EXCLUDE_IPS=""

# --- 目标IP列表文件（可选，每行一个IP） ---
TARGET_IP_FILE=""

# --- Web目标URL（多个用空格分隔） ---
WEB_TARGETS="http://example.com https://example.com"

# --- API端点（多个用空格分隔） ---
API_TARGETS=""

# --- 数据库目标（格式: host:port，多个用空格分隔） ---
DB_TARGETS=""

# --- 测试服务器（需获取root权限的目标） ---
TEST_SERVER_IP=""
TEST_SERVER_USER="root"
TEST_SERVER_PORT="22"

# --- 扫描参数 ---
NMAP_SPEED="4"                    # Nmap扫描速度 (1-5, 5最快)
NMAP_TOP_PORTS="1000"             # 快速扫描端口数
THREAD_COUNT="10"                 # 并发线程数
TIMEOUT="300"                     # 单任务超时(秒)

# --- 爆破参数 ---
BRUTE_USERLIST="/usr/share/wordlists/usernames.txt"
BRUTE_PASSLIST="/usr/share/wordlists/rockyou.txt"
BRUTE_THREADS="4"
BRUTE_TIMEOUT="30"

# --- 输出配置 ---
RESULTS_BASE_DIR="./results"
LOG_LEVEL="INFO"                  # DEBUG, INFO, WARN, ERROR

# --- 通知配置（可选） ---
NOTIFY_EMAIL=""
SLACK_WEBHOOK=""
